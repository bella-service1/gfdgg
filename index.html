<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منتجع أورلين</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      margin: 0;
      padding: 0;
      color: #111111;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 150px;
      overflow: hidden;
      margin-bottom: 8px;
      background: #ffffff;
      border-bottom-left-radius: 28px;
      border-bottom-right-radius: 28px;
      border-bottom: 2px solid #7ec8e3;
    }

    .hero::after {
      content: "";
      position: absolute;
      left: -8%;
      bottom: -20px;
      width: 116%;
      height: 95px;
      background: linear-gradient(90deg, #5dade2, #bdefff, #5dade2);
      border-top-left-radius: 55% 100%;
      border-top-right-radius: 55% 100%;
      transform: rotate(-4deg);
      opacity: 0.95;
    }

    .title-under-header {
      text-align: center;
      font-size: 30px;
      font-weight: 800;
      color: #111111;
      margin: 10px 12px 20px;
      letter-spacing: 1px;
    }

    .container {
      width: 1100px;
      max-width: calc(100% - 24px);
      margin: 0 auto 24px;
      background: #ffffff;
      padding: 24px;
      border-radius: 16px;
      border: 1px solid #7ec8e3;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    h3 {
      background: linear-gradient(90deg, #5dade2, #bdefff, #5dade2);
      color: #111111;
      padding: 12px 16px;
      border-radius: 8px;
      margin: 18px 0 12px;
      font-size: 22px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 14px 16px;
      align-items: center;
      margin-bottom: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-weight: bold;
      color: #111111;
      line-height: 1.5;
    }

    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 10px;
      font-size: 15px;
      border: 1px solid #7ec8e3;
      border-radius: 8px;
      background: #ffffff;
      color: #111111;
    }

    .english-input {
      direction: ltr;
      text-align: center;
      font-family: Arial, sans-serif;
      font-weight: bold;
    }

    input::placeholder,
    textarea::placeholder {
      color: #888888;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .summary-box {
      background: #f0fbff;
      border: 1px solid #7ec8e3;
      color: #111111;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      text-align: center;
    }

    .summary-box span {
      display: block;
      margin-top: 8px;
      font-size: 22px;
      color: #111111;
    }

    .deposit-box input {
      margin-top: 8px;
      text-align: center;
      font-weight: bold;
    }

    .final-box {
      background: linear-gradient(90deg, #5dade2, #bdefff, #5dade2);
      color: #111111;
    }

    .print-btn-container {
      margin-top: 16px;
    }

    .print-btn-container button {
      background: linear-gradient(90deg, #5dade2, #bdefff, #5dade2);
      color: #111111;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    @page {
      size: A4 portrait;
      margin: 6mm;
    }

    @media print {
      html, body {
        width: 210mm !important;
        margin: 0 !important;
        padding: 0 !important;
        background: #ffffff !important;
        color: #111111 !important;
        overflow: visible !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      .hero {
        height: 80px !important;
        margin-bottom: 4px !important;
        border-bottom: 2px solid #7ec8e3 !important;
      }

      .hero::after {
        content: "";
        position: absolute;
        left: -5%;
        bottom: 15px;
        width: 110%;
        height: 55px;
        background: linear-gradient(90deg, #5dade2, #bdefff, #5dade2);
        transform: rotate(-3deg);
      }

      .title-under-header {
        font-size: 22px !important;
        margin: 4px 0 8px !important;
      }

      .container {
        width: 100% !important;
        max-width: 100% !important;
        margin: 0 !important;
        padding: 6px !important;
        border: 1px solid #7ec8e3 !important;
        box-shadow: none !important;
        border-radius: 0 !important;
      }

      .grid {
        grid-template-columns: repeat(6, 1fr) !important;
        gap: 6px !important;
      }

      h3, .final-box {
        background: linear-gradient(90deg, #5dade2, #bdefff, #5dade2) !important;
        color: #111111 !important;
      }

      input, select, textarea, .summary-box {
        border-color: #7ec8e3 !important;
        color: #111111 !important;
      }

      input, select, textarea {
        background: #ffffff !important;
      }

      .english-input {
        direction: ltr !important;
        text-align: center !important;
        font-size: 10px !important;
        padding: 5px 2px !important;
      }

      input, select, textarea {
        font-size: 11px !important;
        padding: 6px !important;
      }

      .summary-grid {
        grid-template-columns: repeat(3, 1fr) !important;
        gap: 6px !important;
      }

      .summary-box {
        background: #f0fbff !important;
        padding: 7px !important;
        font-size: 11px !important;
      }

      .summary-box span {
        font-size: 14px !important;
      }

      textarea {
        min-height: 70px !important;
      }

      .print-btn-container {
        display: none !important;
      }
    }
  </style>
</head>

<body>

  <header class="hero"></header>

  <div class="title-under-header">منتجع أورلين</div>

  <div class="container">

    <div class="grid">

      <div class="field">
        <label>تاريخ التحرير</label>
        <input type="date" id="invoiceDate" class="english-input" lang="en-US">
      </div>

      <div class="field">
        <label>تاريخ الحجز</label>
        <input type="date" class="english-input" lang="en-US">
      </div>

      <div class="field">
        <label>نوع الحفلة</label>
        <select>
          <option value="">اختر</option>
          <option>زواج</option>
          <option>ملكة</option>
          <option>تخرج</option>
          <option>استقبال</option>
          <option>خطوبة</option>
          <option>عقد قران</option>
          <option>استقبال مولود</option>
          <option>عيد ميلاد</option>
          <option>افتتاح</option>
          <option>تكريم</option>
          <option>مناسبة خاصة</option>
          <option>أخرى</option>
        </select>
      </div>

      <div class="field">
        <label>اسم العميل</label>
        <input type="text" placeholder="اسم العميل">
      </div>

      <div class="field">
        <label>رقم جوال العميل</label>
        <input type="tel" class="english-input" placeholder="05xxxxxxxx">
      </div>

      <div class="field">
        <label>رقم هوية العميل</label>
        <input type="text" class="english-input" placeholder="رقم الهوية">
      </div>

    </div>

    <h3>الملخص المالي</h3>

    <div class="summary-grid">

      <div class="summary-box deposit-box">
        المبلغ
        <input type="number" id="mainAmount" min="0" value="0" oninput="calculateGrandTotal()">
      </div>

      <div class="summary-box deposit-box">
        العربون
        <input type="number" id="depositAmount" min="0" value="0" oninput="calculateGrandTotal()">
      </div>

      <div class="summary-box final-box">
        المتبقي بعد العربون
        <span><span id="finalTotal">0</span> ريال</span>
      </div>

    </div>

    <h3>الملاحظات</h3>
    <textarea placeholder="اكتب الملاحظات هنا"></textarea>

    <div class="print-btn-container">
      <button type="button" onclick="preparePrint()">طباعة / حفظ PDF</button>
    </div>

  </div>

  <script>
    function calculateGrandTotal() {
      const amount = Number(document.getElementById("mainAmount").value || 0);
      const deposit = Number(document.getElementById("depositAmount").value || 0);
      const finalTotal = amount - deposit;

      document.getElementById("finalTotal").textContent =
        finalTotal < 0 ? "0.00" : finalTotal.toFixed(2);
    }

    function preparePrint() {
      calculateGrandTotal();

      setTimeout(() => {
        window.print();
      }, 300);
    }

    window.onload = function () {
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, "0");
      const day = String(today.getDate()).padStart(2, "0");

      document.getElementById("invoiceDate").value = `${year}-${month}-${day}`;

      calculateGrandTotal();
    };
  </script>

</body>
</html>
